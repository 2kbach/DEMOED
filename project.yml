name: DEMOED
options:
  bundleIdPrefix: com.kevinauerbach
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
targets:
  DEMOED:
    type: application
    platform: iOS
    sources:
      - path: DEMOED
    info:
      path: DEMOED/Info.plist
      properties:
        CFBundleDisplayName: DEMOED
        CFBundleShortVersionString: "1.4.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        UIStatusBarHidden: true
        UIViewControllerBasedStatusBarAppearance: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSPhotoLibraryAddUsageDescription: "DEMOED saves your screenshots and recordings to Photos."
        NSMicrophoneUsageDescription: "DEMOED can include microphone audio in screen recordings."
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kevinauerbach.demoed
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "5.0"
        DEVELOPMENT_TEAM: "HN9QC35Q26"
        CODE_SIGN_STYLE: Automatic
        MARKETING_VERSION: "1.4.0"
        CURRENT_PROJECT_VERSION: "2"
        GENERATE_INFOPLIST_FILE: NO
